#
# Integration server bootstrap — loads unified config from ../../config/integration.yml
#

server:
  port: 9000

spring:
  config:
    import: optional:file:../../config/integration.yml
  application:
    name: integration-server
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    org.apache.integration: INFO
