server:
  port: 8801

spring:
  application:
    name: seatunnel
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.50.216:3306/seatunnel?useSSL=false&useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: seatunnel
    password: seatunnel
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  ldap:
    url: ldap://localhost:389
    search:
      base: ou=people,dc=example,dc=com
      filter: (uid={0})
      domain: example.com
  authentication:
    providers:
      - DB
      #- LDAP # LDAP authentication is disabled by default
  async-config:
    core-pool-size: 10
    max-pool-size: 20
    queue-capacity: 100

jwt:
  expireTime: 86400
  # HS256 requires key length >= 32 bytes (256 bits)
  secretKey: seatunnel-web-jwt-secret-key-2026
  algorithm: HS256

seatunnel-web:
  database:
    # H2 file database directory (used when spring.profiles.active=h2)
    data-dir: ./data
    schema-location: classpath:script/seatunnel_server_h2.sql
    # MySQL schema script (used when NOT using h2 profile)
    mysql-schema-location: classpath:script/seatunnel_server_mysql.sql
  datasource:
    encryption:
      type: none
      keys-to-encrypt:
        - password
        - auth
  access-controller-class: org.apache.seatunnel.app.permission.SeatunnelAccessControllerDefaultImpl
  engine:
    # SeaTunnel Engine REST API (see seatunnel.yaml engine.http.port)
    http-url: http://127.0.0.1:8080
    # Optional: override engine log directory (default: ${SEATUNNEL_HOME}/logs)
    # log-path:

---
spring:
  config:
    activate:
      on-profile: h2
  sql:
    init:
      # Schema is initialized only on first startup by H2SchemaInitializer
      mode: never
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:${seatunnel-web.database.data-dir}/seatunnel;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=true
    username: sa
    password: sa
  h2:
    console:
      enabled: true
      path: /h2
      settings:
        trace: false
        web-allow-others: false
---
spring:
  config:
    activate:
      on-profile: h2-mem
  sql:
    init:
      schema-locations: classpath*:script/seatunnel_server_h2.sql
      mode: embedded
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:seatunnel;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=true
    username: sa
    password: sa